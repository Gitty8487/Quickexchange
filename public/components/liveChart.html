<div class="live-activity-card">
    <div class="card-header">
        <div class="header-main">
            <i class="fa-solid fa-right-left exchange-icon"></i>
            <h2>Recent Activity</h2>
        </div>
        <div class="live-tag">
            <span class="pulse-dot"></span> LIVE
        </div>
    </div>

    <div class="table-scroll-wrapper" style="overflow-x: auto; width: 100%; -webkit-overflow-scrolling: touch;">
        <table id="liveTable" style="min-width: 550px; table-layout: fixed; width: 100%;">
            <thead>
                <tr>
                    <th style="width: 24%; text-align: left; padding-left: 0;">NAME</th>
                    <th style="width: 18%; text-align: center;">SENT</th>
                    <th style="width: 18%; text-align: center;">RECEIVED</th>
                    <th style="width: 22%; text-align: center;">STATUS</th>
                    <th style="width: 18%; text-align: right;">TIME</th>
                </tr>
            </thead>
            <tbody id="transactionBody">
                </tbody>
        </table>
    </div>
</div>
